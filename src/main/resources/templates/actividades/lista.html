<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Actividades del Hogar</title>
</head>
<body>
<h1>Actividades del Hogar</h1>
<a href="/actividades/nueva">+ Nueva Actividad</a>
<br><br>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Tipo</th>
        <th>Fecha Inicio</th>
        <th>Fecha Fin</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="actividadDTO : ${actividades}">
        <td th:text="${actividadDTO.id}"></td>
        <td th:text="${actividadDTO.titulo}"></td>
        <td th:text="${actividadDTO.tipoActividad}"></td>
        <td th:text="${actividadDTO.fechaInicio}"></td>
        <td th:text="${actividadDTO.fechaTerminacion}"></td>
        <td>
            <a th:href="@{/actividades/{id}(id=${actividadDTO.id})}">Ver</a>
            <a th:href="@{/actividades/{id}/editar(id=${actividadDTO.id})}">Editar</a>
            <form th:action="@{/actividades/{id}/eliminar(id=${actividadDTO.id})}"
                  method="post" style="display:inline">
                <button type="submit">Eliminar</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
